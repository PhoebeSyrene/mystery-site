<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>公演予約 ｜ 浮生三千</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;700;900&family=Noto+Serif+JP:wght@300;400;500;700;900&family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{--ink:#1a1a1a;--ink-soft:#8a8378;--paper:#faf7f2;--card:#ffffff;--lacquer:#9b2226;--lacquer-deep:#7a1a1d;--jade:#4a5d53;--gold:#c19a49;--hair:#e4ddd0;--paper-deep:#f1ebdc;}
*{margin:0;padding:0;box-sizing:border-box;}html{scroll-behavior:smooth;}
body{background:var(--paper);color:var(--ink);font-family:'Noto Sans SC','Noto Sans JP',sans-serif;line-height:1.85;-webkit-font-smoothing:antialiased;font-weight:300;}
h1,h2,h3,.serif{font-family:'Noto Serif SC','Noto Serif JP',serif;}a{color:inherit;text-decoration:none;}
.eyebrow{font-size:0.72rem;letter-spacing:0.32em;color:var(--gold);font-weight:500;}
header{position:sticky;top:0;z-index:100;background:rgba(250,247,242,0.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--hair);}
.nav-wrap{max-width:1200px;margin:0 auto;padding:0 40px;display:flex;align-items:center;justify-content:space-between;height:88px;}
.brand{display:flex;align-items:baseline;gap:12px;}.brand .cn{font-size:1.3rem;font-weight:500;letter-spacing:0.15em;}.brand .en{font-size:0.6rem;letter-spacing:0.24em;color:var(--ink-soft);}
nav.tabs{display:flex;gap:36px;}
nav.tabs a{position:relative;font-size:0.83rem;letter-spacing:0.04em;color:var(--ink);padding-bottom:4px;white-space:nowrap;}
nav.tabs a::after{content:"";position:absolute;left:0;bottom:0;width:0;height:1px;background:var(--lacquer);transition:width .25s ease;}
nav.tabs a:hover::after{width:100%;}nav.tabs a.active{color:var(--lacquer);}
.nav-cta{border:1px solid var(--lacquer);color:var(--lacquer);padding:11px 24px;font-size:0.8rem;letter-spacing:0.06em;transition:all .2s ease;white-space:nowrap;}
.nav-cta:hover{background:var(--lacquer);color:#fff;}
@media (max-width:1000px){nav.tabs{display:none;}.nav-wrap{padding:0 24px;}}
.page-hero{max-width:1200px;margin:0 auto;padding:80px 40px 60px;border-bottom:1px solid var(--hair);}
.page-hero .eyebrow{margin-bottom:20px;display:block;}
.page-hero h1{font-size:clamp(1.8rem,3.2vw,2.5rem);font-weight:400;letter-spacing:0.03em;line-height:1.5;}
.page-hero p.lead{margin-top:22px;color:var(--ink-soft);font-size:0.98rem;max-width:60ch;font-weight:300;}
.content{max-width:1200px;margin:0 auto;padding:80px 40px;}
.notice{font-size:0.88rem;color:var(--ink-soft);margin-bottom:24px;padding:16px 20px;border-left:2px solid var(--gold);background:var(--paper-deep);}
.form-embed-wrap{background:var(--card);border:1px solid var(--hair);max-width:760px;margin:0 auto;overflow:hidden;}
.form-embed-wrap iframe{display:block;width:100%;border:none;}
footer{text-align:center;padding:40px 20px;font-size:0.76rem;color:rgba(250,247,242,0.5);background:var(--ink);border-top:1px solid rgba(250,247,242,0.1);font-weight:300;letter-spacing:0.04em;}
footer a{color:var(--gold);}
</style>
</head>
<body>

<header>
  <div class="nav-wrap">
    <a href="index.html" class="brand">
      <span class="cn serif">浮生三千</span>
      <span class="en">FUSHENG SANQIAN — MYSTERY BRIDGE</span>
    </a>
    <nav class="tabs">
      <a href="about.html">私たちについて</a>
      <a href="lineup.html">作品ラインナップ</a>
      <a href="candidates.html">候補シナリオ</a>
      <a href="japan-to-china.html">日本発 中国へ</a>
      <a href="contact.html">シナリオ購入</a>
    </nav>
    <a href="ticket.html" class="nav-cta active">チケット予約</a>
  </div>
</header>

<div style="background:var(--paper-deep) url('images/hero-band-red.webp') right center/cover no-repeat;">
<div class="page-hero">
  <span class="eyebrow">RESERVATION</span>
  <h1>公演予約</h1>
  <p class="lead">公演へのご参加はこちらのフォームからお申し込みください。ご記入後、担当より詳細をご案内いたします。</p>
</div>
</div>

<div class="content">
  <p class="notice">※ ご予約はお申し込み順となります。定員に達した場合、ご希望に添えない場合があります。</p>
  <div class="form-embed-wrap">
    <iframe
      src="https://docs.google.com/forms/d/e/1FAIpQLSf8dBLhzf1xU67AprWq5BtWICbx-HuzVd2kIc2qlxQZignVPg/viewform?embedded=true"
      frameborder="0"
      marginheight="0"
      marginwidth="0"
      style="width:100%;min-height:1200px;">
      読み込んでいます…
    </iframe>
  </div>
</div>

<footer>
  © 浮生三千 All rights reserved. ｜ mystery.threethousandlives.com
</footer>

</body>
</html>
