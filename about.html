<html lang="ja">
<head>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;700;900&family=Noto+Serif+JP:wght@300;400;500;700;900&family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet"><style>
:root{--ink:#1a1a1a;--ink-soft:#8a8378;--paper:#faf7f2;--card:#ffffff;--lacquer:#9b2226;--lacquer-deep:#7a1a1d;--jade:#4a5d53;--gold:#c19a49;--hair:#e4ddd0;--paper-deep:#f1ebdc;}
*{margin:0;padding:0;box-sizing:border-box;}html{scroll-behavior:smooth;}
body{background:var(--paper);color:var(--ink);font-family:'Noto Sans SC','Noto Sans JP',sans-serif;line-height:1.85;-webkit-font-smoothing:antialiased;font-weight:300;}
h1,h2,h3,.serif{font-family:'Noto Serif SC','Noto Serif JP',serif;}a{color:inherit;text-decoration:none;}
.eyebrow{font-size:0.72rem;letter-spacing:0.32em;color:var(--gold);font-weight:500;}
header{position:sticky;top:0;z-index:100;background:rgba(250,247,242,0.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--hair);}
.nav-wrap{max-width:1200px;margin:0 auto;padding:0 40px;display:flex;align-items:center;justify-content:space-between;height:88px;}
.brand{display:flex;align-items:baseline;gap:12px;}.brand .cn{font-size:1.3rem;font-weight:500;letter-spacing:0.15em;}.brand .en{font-size:0.6rem;letter-spacing:0.24em;color:var(--ink-soft);}
nav.tabs{display:flex;gap:36px;}
nav.tabs a{position:relative;font-size:0.83rem;letter-spacing:0.04em;color:var(--ink);padding-bottom:4px;white-space:nowrap;}
nav.tabs a::after{content:"";position:absolute;left:0;bottom:0;width:0;height:1px;background:var(--lacquer);transition:width .25s ease;}
nav.tabs a:hover::after{width:100%;}nav.tabs a.active{color:var(--lacquer);}
.nav-cta{border:1px solid var(--ink);color:var(--ink);padding:11px 24px;font-size:0.8rem;letter-spacing:0.06em;transition:all .2s ease;white-space:nowrap;}
.nav-cta:hover{background:var(--ink);color:var(--paper);}
@media (max-width:1000px){nav.tabs{display:none;}.nav-wrap{padding:0 24px;}}
.page-hero{max-width:1200px;margin:0 auto;padding:80px 40px 60px;border-bottom:1px solid var(--hair);}
.page-hero .eyebrow{margin-bottom:20px;display:block;}
.page-hero h1{font-size:clamp(1.8rem,3.2vw,2.5rem);font-weight:400;letter-spacing:0.03em;line-height:1.5;}
.page-hero p.lead{margin-top:22px;color:var(--ink-soft);font-size:0.98rem;max-width:56ch;font-weight:300;}
section{max-width:1200px;margin:0 auto;padding:100px 40px;}
.section-head{margin-bottom:60px;}.section-head .eyebrow{margin-bottom:18px;display:block;}
.section-head h2{font-size:clamp(1.6rem,2.4vw,2.1rem);font-weight:400;letter-spacing:0.04em;}
.rule{width:48px;height:1px;background:var(--gold);margin-top:28px;}
.direction-banner{background:var(--paper-deep);border-top:1px solid var(--hair);border-bottom:1px solid var(--hair);}
.direction-banner .inner{max-width:1200px;margin:0 auto;padding:60px 40px;display:grid;grid-template-columns:1fr auto 1fr;gap:40px;align-items:center;}
.direction-card{background:var(--card);border:1px solid var(--hair);padding:36px 32px;}
.direction-card .dir-label{font-size:0.7rem;letter-spacing:0.2em;color:var(--gold);margin-bottom:14px;}
.direction-card h3{font-family:'Noto Serif SC','Noto Serif JP',serif;font-size:1.1rem;font-weight:400;line-height:1.7;margin-bottom:12px;}
.direction-card p{font-size:0.86rem;color:var(--ink-soft);font-weight:300;}
.direction-card.primary{border-left:3px solid var(--lacquer);}
.direction-divider{display:flex;flex-direction:column;align-items:center;gap:8px;color:var(--gold);font-size:1.4rem;}
.direction-divider span{font-size:0.68rem;letter-spacing:0.16em;color:var(--ink-soft);}
@media (max-width:900px){.direction-banner .inner{grid-template-columns:1fr;gap:20px;}.direction-divider{flex-direction:row;}}
.about-grid{display:grid;grid-template-columns:0.95fr 1.05fr;gap:80px;}
.about-grid > div:first-child p{color:var(--ink-soft);margin-bottom:22px;font-size:0.98rem;font-weight:300;}
.about-grid > div:first-child strong{color:var(--ink);font-weight:500;}
.role-list{display:flex;flex-direction:column;}
.role-item{display:grid;grid-template-columns:56px 1fr;gap:24px;padding:28px 0;border-top:1px solid var(--hair);}
.role-item:last-child{border-bottom:1px solid var(--hair);}
.role-item .no{font-family:'Noto Serif SC','Noto Serif JP',serif;font-size:1.3rem;color:var(--gold);font-weight:400;}
.role-item h3{font-size:1.02rem;font-weight:500;margin-bottom:8px;}
.role-item p{font-size:0.88rem;color:var(--ink-soft);font-weight:300;}
@media (max-width:900px){.about-grid{grid-template-columns:1fr;gap:50px;}}
.why-section{background:var(--paper-deep);}
.why-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--hair);border:1px solid var(--hair);margin-top:40px;}
.why-card{background:var(--card);padding:36px 32px;}
.why-card .no{font-family:'Noto Serif SC','Noto Serif JP',serif;font-size:1.1rem;color:var(--gold);margin-bottom:14px;}
.why-card h3{font-size:1rem;font-weight:500;margin-bottom:10px;}
.why-card p{font-size:0.87rem;color:var(--ink-soft);font-weight:300;line-height:1.8;}
@media (max-width:700px){.why-grid{grid-template-columns:1fr;}}
.process-list{display:grid;grid-template-columns:repeat(4,1fr);gap:44px;}
.process-step{border-top:1px solid var(--ink);padding-top:24px;}
.process-step .num{font-family:'Noto Serif SC','Noto Serif JP',serif;font-size:1.15rem;color:var(--gold);margin-bottom:18px;font-weight:400;}
.process-step h3{font-size:0.96rem;font-weight:500;margin-bottom:10px;}
.process-step p{font-size:0.84rem;color:var(--ink-soft);font-weight:300;}
@media (max-width:900px){.process-list{grid-template-columns:1fr 1fr;row-gap:36px;}}
@media (max-width:560px){.process-list{grid-template-columns:1fr;}}
footer{text-align:center;padding:40px 20px;font-size:0.76rem;background:var(--ink);border-top:1px solid rgba(250,247,242,0.1);font-weight:300;letter-spacing:0.04em;color:rgba(250,247,242,0.5);}
footer a{color:var(--gold);}
</style>
